<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قارئ QR JSON</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- مكتبة قراءة QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 320px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      direction: ltr;
      white-space: pre-wrap;
      word-break: break-word;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>📷 مسح QR Code (JSON)</h2>

<div id="reader"></div>

<button onclick="startScanner()">ابدأ المسح</button>

<div id="result">ستظهر البيانات هنا...</div>

<script>
  let html5QrCode;

  function startScanner() {
    html5QrCode = new Html5Qrcode("reader");

    // إجبار استخدام الكاميرا الخلفية
    const config = {
      fps: 10,
      qrbox: 250
    };

    Html5Qrcode.getCameras().then(devices => {
      if (!devices || devices.length === 0) {
        document.getElementById("result").innerText = "لا توجد كاميرا";
        return;
      }

      // نحاول اختيار الكاميرا الخلفية
      let cameraId = devices[0].id;

      for (let device of devices) {
        if (device.label.toLowerCase().includes("back") ||
            device.label.toLowerCase().includes("environment")) {
          cameraId = device.id;
        }
      }

      html5QrCode.start(
        cameraId,
        config,
        (decodedText) => {
          try {
            const json = JSON.parse(decodedText);
            document.getElementById("result").innerHTML =
              "<b>📦 البيانات المستخرجة:</b><br><pre>" +
              JSON.stringify(json, null, 2) +
              "</pre>";
          } catch (e) {
            document.getElementById("result").innerHTML =
              "❌ البيانات ليست JSON:<br><br>" + decodedText;
          }
        },
        (errorMessage) => {
          // تجاهل الأخطاء المتكررة
        }
      );

    }).catch(err => {
      document.getElementById("result").innerText =
        "❌ خطأ في تشغيل الكاميرا: " + err;
    });
  }
</script>

</body>
</html>
