<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قارئ QR JSON</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 320px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    button {
      margin: 10px 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      direction: ltr;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>

<h2>📷 قارئ QR Code (JSON)</h2>

<div id="reader"></div>

<button onclick="startScanner()">▶️ تشغيل الكاميرا</button>
<button onclick="switchCamera()">🔄 تبديل الكاميرا</button>
<button onclick="stopScanner()">⛔ إيقاف</button>

<div id="result">ستظهر البيانات هنا...</div>

<script>
  let html5QrCode;
  let cameras = [];
  let currentCameraIndex = 0;

  function startScanner() {
    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
      if (!devices || devices.length === 0) {
        document.getElementById("result").innerText = "لا توجد كاميرا";
        return;
      }

      cameras = devices;

      // افتراضي: الكاميرا الأولى
      currentCameraIndex = 0;

      startCamera(cameras[currentCameraIndex].id);
    }).catch(err => {
      document.getElementById("result").innerText =
        "❌ خطأ في الوصول للكاميرا: " + err;
    });
  }

  function startCamera(cameraId) {
    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        try {
          const json = JSON.parse(decodedText);
          document.getElementById("result").innerHTML =
            "<b>📦 البيانات:</b><br><pre>" +
            JSON.stringify(json, null, 2) +
            "</pre>";
        } catch {
          document.getElementById("result").innerHTML =
            "❌ ليست JSON:<br><br>" + decodedText;
        }
      }
    ).catch(err => {
      document.getElementById("result").innerText =
        "❌ لا يمكن تشغيل الكاميرا: " + err;
    });
  }

  function switchCamera() {
    if (cameras.length < 2) {
      alert("لا يوجد أكثر من كاميرا");
      return;
    }

    // إيقاف الحالية
    html5QrCode.stop().then(() => {

      // الانتقال للكاميرا التالية
      currentCameraIndex = (currentCameraIndex + 1) % cameras.length;

      startCamera(cameras[currentCameraIndex].id);

    }).catch(err => {
      console.log("خطأ في الإيقاف:", err);
    });
  }

  function stopScanner() {
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        document.getElementById("result").innerText = "⛔ تم إيقاف الكاميرا";
      });
    }
  }
</script>

</body>
</html>
