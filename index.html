<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قارئ QR Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
      text-align: left;
      direction: ltr;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <h2>📷 مسح QR Code</h2>

  <div id="reader"></div>

  <div id="result">النتيجة ستظهر هنا...</div>

  <script>
    function onScanSuccess(decodedText) {
      try {
        let jsonData = JSON.parse(decodedText);
        document.getElementById("result").innerHTML =
          "<pre>" + JSON.stringify(jsonData, null, 2) + "</pre>";
      } catch (e) {
        document.getElementById("result").innerHTML =
          "❌ البيانات ليست بصيغة JSON<br><br>" + decodedText;
      }
    }

    function onScanError(error) {
      // تجاهل الأخطاء المتكررة
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: 250 }
    );

    html5QrcodeScanner.render(onScanSuccess, onScanError);
  </script>

</body>
</html>
